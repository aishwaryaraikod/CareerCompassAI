{% extends "base.html" %}
{% block title %}Contact - Career Compass AI{% endblock %}
{% block content %}
<section class="auth-card glass-card">
  <h2>Contact</h2>
  <form method="post">
    <label>Name</label><input class="form-control" name="name" required>
    <label>Email</label><input class="form-control" type="email" name="email" required>
    <label>Message</label><textarea class="form-control" name="message" rows="5" required></textarea>
    <button class="btn btn-cyan w-100 mt-3">Send Message</button>
  </form>
</section>
{% endblock %}
