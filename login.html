{% extends "base.html" %}
{% block title %}Login - Career Compass AI{% endblock %}
{% block content %}
<section class="auth-card glass-card">
  <h2>Student Login</h2>
  <form method="post">
    <label>Email</label>
    <input class="form-control" type="email" name="email" required>
    <label>Password</label>
    <input class="form-control" type="password" name="password" required>
    <button class="btn btn-cyan w-100 mt-3">Login</button>
  </form>
  <p class="mt-3 mb-0">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
</section>
{% endblock %}
